{% load static %}
<!DOCTYPE html>
<html lang="pt-BR" data-theme="{{ user_theme }}">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}RU Pay{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'rupayapp/style.css' %}">
  <script src="{% static 'rupayapp/theme.js' %}" defer></script>
</head>

<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="logo" href="{% url 'rupayapp:home' %}">RU Pay</a>
      <nav class="nav">
        <a href="{% url 'rupayapp:student_lookup' %}"
          class="{% if request.resolver_match.url_name == 'student_lookup' %}active{% endif %}">
          Área do aluno
        </a>

        <a href="{% url 'rupayapp:operator_panel' %}"
          class="{% if request.resolver_match.url_name == 'operator_panel' %}active{% endif %}">
          Operador
        </a>

        <a href="{% url 'rupayapp:turnstile' %}"
          class="{% if request.resolver_match.url_name == 'turnstile' %}active{% endif %}">
          Catraca
        </a>

        <a href="{% url 'rupayapp:cardapio' %}"
          class="{% if request.resolver_match.url_name == 'cardapio' %}active{% endif %}">
          Cardápio
        </a>
      </nav>

      <!-- Theme Selector Dropdown -->
      <div class="theme-selector-dropdown">
        <button type="button" class="theme-toggle-btn" title="Mudar tema" aria-label="Seletor de tema">
          <i class="bi bi-palette"></i>
        </button>
        <div class="theme-dropdown-menu" role="menu" aria-label="Seleção de tema">
          <button type="button" class="theme-dropdown-item" data-theme="light" title="Tema Claro">
            <i class="bi bi-sun"></i> Claro
          </button>
          <button type="button" class="theme-dropdown-item" data-theme="dark" title="Tema Escuro">
            <i class="bi bi-moon"></i> Escuro
          </button>
          <button type="button" class="theme-dropdown-item" data-theme="high_contrast" title="Alto Contraste">
            <i class="bi bi-eye"></i> Alto Contraste
          </button>
        </div>
      </div>
    </div>
  </header>

  {% if messages %}
  <div class="wrap messages">
    {% for message in messages %}
    <p class="flash flash-{{ message.tags }}">{{ message }}</p>
    {% endfor %}
  </div>
  {% endif %}

  <main class="wrap main">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <small>Restaurante Universitário — protótipo acadêmico</small>
    </div>
  </footer>
</body>

</html>
