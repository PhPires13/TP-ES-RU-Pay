{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}RU Pay{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'rupayapp/style.css' %}">
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="logo" href="{% url 'rupayapp:home' %}">RU Pay</a>
      <nav class="nav">
        <a href="{% url 'rupayapp:student_lookup' %}">Aluno</a>
        <a href="{% url 'rupayapp:operator_panel' %}">Operador</a>
        <a href="{% url 'rupayapp:turnstile' %}">Catraca</a>
        <a href="{% url 'rupayapp:cardapio' %}">Cardápio do dia</a>
      </nav>
    </div>
  </header>

  {% if messages %}
    <div class="wrap messages">
      {% for message in messages %}
        <p class="flash flash-{{ message.tags }}">{{ message }}</p>
      {% endfor %}
    </div>
  {% endif %}

  <main class="wrap main">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <small>Restaurante Universitário — protótipo acadêmico</small>
    </div>
  </footer>
</body>
</html>
