{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}RU Pay{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'rupayapp/style.css' %}">
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="header-logo" href="{% url 'rupayapp:home' %}">
          {% include 'rupayapp/logo.svg' %}
      </a>
<nav class="nav">
  <a href="{% url 'rupayapp:student_lookup' %}"
     class="{% if request.resolver_match.url_name == 'student_lookup' %}active{% endif %}">
     Área do aluno
  </a>

  <a href="{% url 'rupayapp:operator_panel' %}"
     class="{% if request.resolver_match.url_name == 'operator_panel' %}active{% endif %}">
     Operador
  </a>

  <a href="{% url 'rupayapp:turnstile' %}"
     class="{% if request.resolver_match.url_name == 'turnstile' %}active{% endif %}">
     Catraca
  </a>

  <a href="{% url 'rupayapp:cardapio' %}"
     class="{% if request.resolver_match.url_name == 'cardapio' %}active{% endif %}">
     Cardápio
  </a>
</nav>
    </div>
  </header>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Django Messages (Hidden) -->
  <div style="display: none;" id="messages-data">
    {% for message in messages %}
      <div data-message="{{ message }}" data-level="{{ message.level_tag }}"></div>
    {% endfor %}
  </div>

  <main class="wrap main">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <small>Restaurante Universitário — protótipo acadêmico</small>
    </div>
  </footer>

  <script>
    // Toast notification system
    function showToast(message, level) {
      const container = document.getElementById('toast-container');

      // Map message levels to icons and CSS classes
      const levelMap = {
        success: { icon: '✓', class: 'toast-success' },
        error: { icon: '✕', class: 'toast-error' },
        danger: { icon: '✕', class: 'toast-error' },
        warning: { icon: '⚠', class: 'toast-warning' },
        info: { icon: 'ⓘ', class: 'toast-info' },
      };

      const config = levelMap[level] || levelMap['info'];

      const toast = document.createElement('div');
      toast.className = `toast ${config.class}`;
      toast.innerHTML = `
        <span class="toast-icon">${config.icon}</span>
        <span class="toast-message">${message}</span>
        <button class="toast-close" aria-label="Close notification">&times;</button>
      `;

      container.appendChild(toast);

      // Add close button functionality
      toast.querySelector('.toast-close').addEventListener('click', () => {
        removeToast(toast);
      });

      // Auto-remove after 5 seconds
      setTimeout(() => {
        removeToast(toast);
      }, 5000);
    }

    function removeToast(toast) {
      toast.classList.add('removing');
      setTimeout(() => {
        toast.remove();
      }, 300);
    }

    // Initialize toasts from Django messages
    document.addEventListener('DOMContentLoaded', () => {
      const messagesData = document.getElementById('messages-data');
      if (messagesData) {
        const messages = messagesData.querySelectorAll('div[data-message]');
        messages.forEach(msg => {
          const messageText = msg.getAttribute('data-message');
          const messageLevel = msg.getAttribute('data-level');
          showToast(messageText, messageLevel);
        });
      }
    });
  </script>
</body>
</html>
